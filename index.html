<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verithos</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚜️</text></svg>"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root[data-theme="dark"] {
        --bg: #0a0a08;
        --bg-secondary: #111110;
        --surface: #161614;
        --border: #2a2820;
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --text: #e8dcc8;
        --text-muted: #7a7060;
        --user-bubble: #1e1a10;
        --bot-bubble: #13120f;
        --shadow: rgba(0, 0, 0, 0.6);
        --glow: rgba(201, 168, 76, 0.15);
        --error: #c94c4c;
        --sidebar-bg: #0d0d0b;
        --sidebar-hover: #1a1a16;
        --sidebar-width: 280px;
      }
      :root[data-theme="light"] {
        --bg: #faf6ee;
        --bg-secondary: #f5efe0;
        --surface: #ffffff;
        --border: #e8dcc8;
        --gold: #9a7230;
        --gold-light: #c49a3c;
        --text: #2a2010;
        --text-muted: #9a8a6a;
        --user-bubble: #2a2010;
        --bot-bubble: #f5efe0;
        --shadow: rgba(100, 80, 40, 0.15);
        --glow: rgba(154, 114, 48, 0.1);
        --error: #c94c4c;
        --sidebar-bg: #f0e8d8;
        --sidebar-hover: #e8dcc8;
        --sidebar-width: 280px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Raleway", sans-serif;
        background: var(--bg);
        transition: background 0.5s ease;
        background-image:
          radial-gradient(ellipse at 20% 50%, var(--glow) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, var(--glow) 0%, transparent 50%);
      }

      @keyframes riseUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── LOGIN ── */
      .login-screen {
        width: 90%;
        max-width: 420px;
        padding: 48px 40px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: 0 32px 80px var(--shadow);
        animation: riseUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .login-brand {
        font-family: "Cormorant Garamond", serif;
        font-size: 2.4rem;
        font-weight: 300;
        letter-spacing: 0.14em;
        color: var(--gold);
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 6px;
      }

      .login-tagline {
        font-size: 0.6rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 40px;
      }

      .login-divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin-bottom: 36px;
      }

      .login-field {
        margin-bottom: 20px;
      }

      .login-field label {
        display: block;
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .login-field input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "Raleway", sans-serif;
        font-size: 0.88rem;
        font-weight: 300;
        outline: none;
        border-radius: 2px;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      .login-field input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px var(--glow);
      }

      .login-error {
        font-size: 0.75rem;
        color: var(--error);
        text-align: center;
        margin-bottom: 16px;
        height: 16px;
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        background: none;
        border: 1px solid var(--gold);
        color: var(--gold);
        font-family: "Raleway", sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.3s ease;
        margin-top: 8px;
      }

      .login-btn:hover {
        background: var(--glow);
      }

      .login-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.6rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      /* ── APP ── */
      .app-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* ── LAYOUT ── */
      .app-layout {
        display: flex;
        width: 100%;
        height: 100%;
        transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 0;
        min-width: 0;
        height: 100%;
        background: var(--sidebar-bg);
        border-right: 1px solid transparent;
        overflow: hidden;
        flex-shrink: 0;
        transition:
          width 0.35s cubic-bezier(0.16, 1, 0.3, 1),
          min-width 0.35s cubic-bezier(0.16, 1, 0.3, 1),
          border-color 0.35s ease;
        display: flex;
        flex-direction: column;
      }

      .sidebar.open {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        border-color: var(--border);
      }

      @media (max-width: 600px) {
        .sidebar.open {
          width: 75vw;
          min-width: 75vw;
        }
      }

      .sidebar-inner {
        width: var(--sidebar-width);
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        padding: 24px 20px 16px;
        border-bottom: 1px solid var(--border);
        position: relative;
        flex-shrink: 0;
      }

      .sidebar-header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 20px;
        right: 20px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }

      .sidebar-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 0.9rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 12px;
      }

      .new-chat-btn {
        width: 100%;
        padding: 10px;
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-family: "Raleway", sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.3s ease;
      }

      .new-chat-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--glow);
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .sidebar-empty {
        text-align: center;
        padding: 40px 20px;
        font-size: 0.72rem;
        color: var(--text-muted);
        font-style: italic;
        font-family: "Cormorant Garamond", serif;
      }

      .chat-history-item {
        padding: 12px 14px;
        border-radius: 2px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s ease;
        margin-bottom: 4px;
        position: relative;
      }

      .chat-history-item:hover {
        background: var(--sidebar-hover);
        border-color: var(--border);
      }
      .chat-history-item.active {
        background: var(--glow);
        border-color: var(--gold);
      }

      .item-title {
        font-size: 0.8rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
      }

      .item-meta {
        font-size: 0.62rem;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
      }

      .item-mode-badge {
        color: var(--gold);
        font-size: 0.58rem;
        text-transform: uppercase;
      }

      .item-delete {
        position: absolute;
        top: 8px;
        right: 8px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.75rem;
        opacity: 0;
        transition: opacity 0.2s;
        padding: 2px 4px;
      }

      .chat-history-item:hover .item-delete {
        opacity: 1;
      }
      .item-delete:hover {
        color: var(--error);
      }

      .sidebar-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        font-size: 0.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-muted);
        text-align: center;
        flex-shrink: 0;
      }

      /* ── CHAT WRAP ── */
      .chat-wrap {
        flex: 1;
        min-width: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        overflow: hidden;
        animation: riseUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .chat-header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: relative;
        flex-shrink: 0;
      }

      .chat-header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 20px;
        right: 20px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }

      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .header-left-group {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-name {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.2rem, 3vw, 1.6rem);
        font-weight: 300;
        letter-spacing: 0.12em;
        color: var(--gold);
        text-transform: uppercase;
        white-space: nowrap;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 8px var(--gold);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .icon-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .mode-row {
        display: flex;
        align-items: center;
        overflow-x: auto;
        scrollbar-width: none;
        gap: 2px;
      }

      .mode-row::-webkit-scrollbar {
        display: none;
      }

      .mode-letter {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(0.85rem, 2vw, 1rem);
        font-weight: 400;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 2px;
        border: 1px solid transparent;
        transition: all 0.25s ease;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .mode-letter:hover {
        color: var(--gold);
        border-color: var(--border);
      }
      .mode-letter.active {
        color: var(--gold);
        border-color: var(--gold);
        background: var(--glow);
      }

      .mode-label {
        font-size: 0.58rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-left: 8px;
        padding-left: 8px;
        border-left: 1px solid var(--border);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .sovereign-panel {
        display: none;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-secondary);
        flex-shrink: 0;
      }

      .sovereign-label {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .sovereign-input-row {
        display: flex;
        gap: 8px;
      }

      .sovereign-input-row input {
        flex: 1;
        padding: 9px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "Cormorant Garamond", serif;
        font-size: 0.9rem;
        font-style: italic;
        outline: none;
        border-radius: 2px;
        min-width: 0;
        transition: border-color 0.3s ease;
      }

      .sovereign-input-row input:focus {
        border-color: var(--gold);
      }

      .sovereign-btn {
        padding: 9px 14px;
        background: none;
        border: 1px solid var(--gold);
        color: var(--gold);
        font-family: "Raleway", sans-serif;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.3s ease;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .sovereign-btn:hover {
        background: var(--glow);
      }

      .chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .chat-messages::-webkit-scrollbar {
        width: 4px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .message {
        max-width: min(80%, 600px);
        padding: 12px 16px;
        font-size: 0.88rem;
        line-height: 1.7;
        opacity: 0;
        animation: messageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        background: var(--user-bubble);
        color: var(--gold-light);
        align-self: flex-end;
        border: 1px solid var(--border);
        border-radius: 12px 12px 2px 12px;
        font-weight: 300;
      }

      .message.bot {
        background: var(--bot-bubble);
        color: var(--text);
        align-self: flex-start;
        border: 1px solid var(--border);
        border-radius: 2px 12px 12px 12px;
        font-family: "Cormorant Garamond", serif;
        font-size: 1rem;
        font-weight: 300;
        position: relative;
      }

      .message.bot::before {
        content: "◆";
        position: absolute;
        top: 14px;
        left: -16px;
        font-size: 0.35rem;
        color: var(--gold);
        opacity: 0.5;
      }

      .message.bot p {
        margin-bottom: 8px;
      }
      .message.bot p:last-child {
        margin-bottom: 0;
      }
      .message.bot strong {
        color: var(--gold-light);
        font-weight: 600;
      }
      .message.bot em {
        font-style: italic;
        color: var(--text-muted);
      }
      .message.bot ul,
      .message.bot ol {
        padding-left: 18px;
        margin-bottom: 8px;
      }
      .message.bot li {
        margin-bottom: 4px;
      }
      .message.bot code {
        background: var(--bg);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.8rem;
        color: var(--gold);
        border: 1px solid var(--border);
      }

      .streaming-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background: var(--gold);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 0.7s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .mode-toast {
        align-self: center;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 6px 14px;
        border: 1px solid var(--border);
        border-radius: 20px;
        opacity: 0;
        animation: messageIn 0.4s ease forwards;
      }

      .typing {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 16px;
        background: var(--bot-bubble);
        border: 1px solid var(--border);
        border-radius: 2px 12px 12px 12px;
        align-self: flex-start;
        opacity: 0;
        animation: messageIn 0.4s ease forwards;
      }

      .typing span {
        width: 5px;
        height: 5px;
        background: var(--gold);
        border-radius: 50%;
        animation: typingBounce 1.4s infinite;
        opacity: 0.6;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typingBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      .chat-input {
        padding: 14px 20px 18px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        position: relative;
        flex-shrink: 0;
      }

      .chat-input::before {
        content: "";
        position: absolute;
        top: 0;
        left: 20px;
        right: 20px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px 14px;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease;
        background: var(--bg-secondary);
      }

      .input-wrapper:focus-within {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px var(--glow);
      }

      .chat-input input {
        flex: 1;
        background: none;
        border: none;
        color: var(--text);
        font-family: "Raleway", sans-serif;
        font-size: 0.88rem;
        font-weight: 300;
        outline: none;
        min-width: 0;
      }

      .chat-input input::placeholder {
        color: var(--text-muted);
        font-style: italic;
        font-family: "Cormorant Garamond", serif;
      }

      .send-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        width: 30px;
        height: 30px;
        border-radius: 2px;
        cursor: pointer;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        flex-shrink: 0;
      }

      .send-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--glow);
      }

      .footer-text {
        text-align: center;
        margin-top: 8px;
        font-size: 0.57rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      @media (max-width: 480px) {
        .chat-header {
          padding: 12px 14px 10px;
        }
        .chat-messages {
          padding: 14px;
        }
        .chat-input {
          padding: 10px 14px 14px;
        }
        .icon-btn {
          width: 28px;
          height: 28px;
          font-size: 0.7rem;
        }
        .message {
          max-width: 90%;
        }
        .message.bot::before {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
      <div class="login-brand">Verithos</div>
      <div class="login-tagline">Intelligent Discourse</div>
      <div class="login-divider"></div>
      <div class="login-field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" onclick="handleLogin()">Enter Verithos</button>
      <div class="login-footer">Verithos · Private Access</div>
    </div>

    <!-- APP -->
    <div class="app-screen" id="appScreen">
      <div class="app-layout">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
          <div class="sidebar-inner">
            <div class="sidebar-header">
              <div class="sidebar-title">Conversations</div>
              <button class="new-chat-btn" onclick="newChat()">
                + New Conversation
              </button>
            </div>
            <div class="sidebar-list" id="sidebarList">
              <div class="sidebar-empty" id="sidebarEmpty">
                No conversations yet.<br />Begin your first discourse.
              </div>
            </div>
            <div class="sidebar-footer">Verithos · History</div>
          </div>
        </div>

        <!-- CHAT -->
        <div class="chat-wrap">
          <div class="chat-header">
            <div class="header-top">
              <div class="header-left-group">
                <button class="icon-btn" onclick="toggleSidebar()">☰</button>
                <div class="brand-name">Verithos</div>
              </div>
              <div class="header-controls">
                <div class="status-dot"></div>
                <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">
                  ☀️
                </button>
                <button class="icon-btn" onclick="shareChat()" title="Share">
                  ⇪
                </button>
                <button
                  class="icon-btn"
                  onclick="handleLogout()"
                  title="Sign out"
                >
                  ⇥
                </button>
              </div>
            </div>
            <div class="mode-row">
              <div
                class="mode-letter active"
                data-mode="V"
                onclick="setMode(this)"
                title="Versatile"
              >
                V
              </div>
              <div
                class="mode-letter"
                data-mode="E"
                onclick="setMode(this)"
                title="Expert — DECA"
              >
                E
              </div>
              <div
                class="mode-letter"
                data-mode="R"
                onclick="setMode(this)"
                title="Resilience — Fitness"
              >
                R
              </div>
              <div
                class="mode-letter"
                data-mode="I"
                onclick="setMode(this)"
                title="Investigator"
              >
                I
              </div>
              <div
                class="mode-letter"
                data-mode="T"
                onclick="setMode(this)"
                title="Tutor"
              >
                T
              </div>
              <div
                class="mode-letter"
                data-mode="H"
                onclick="setMode(this)"
                title="Holistic"
              >
                H
              </div>
              <div
                class="mode-letter"
                data-mode="O"
                onclick="setMode(this)"
                title="Opposition"
              >
                O
              </div>
              <div
                class="mode-letter"
                data-mode="S"
                onclick="setMode(this)"
                title="Sovereign"
              >
                S
              </div>
              <div class="mode-label" id="modeLabel">Versatile</div>
            </div>
          </div>

          <div class="sovereign-panel" id="sovereignPanel">
            <div class="sovereign-label">Define your Sovereign</div>
            <div class="sovereign-input-row">
              <input
                type="text"
                id="sovereignInput"
                placeholder="e.g. A strict Stoic philosopher..."
              />
              <button class="sovereign-btn" onclick="applySovereign()">
                Activate
              </button>
            </div>
          </div>

          <div class="chat-messages" id="messages">
            <div class="message bot">
              Good evening. I am Verithos — how may I assist you today?
            </div>
          </div>

          <div class="chat-input">
            <div class="input-wrapper">
              <input
                type="text"
                id="userInput"
                placeholder="Speak your mind..."
              />
              <button class="send-btn" onclick="sendMessage()">→</button>
            </div>
            <div class="footer-text">Verithos · Intelligent Discourse</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const USERS = { "demo@verithos.com": "verithos2026" };

      function handleLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        const error = document.getElementById("loginError");
        if (USERS[email] && USERS[email] === password) {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("appScreen").style.display = "block";
          error.textContent = "";
          loadHistory();
        } else {
          error.textContent = "Invalid credentials. Please try again.";
        }
      }

      function handleLogout() {
        document.getElementById("appScreen").style.display = "none";
        document.getElementById("loginScreen").style.display = "block";
        document.getElementById("loginEmail").value = "";
        document.getElementById("loginPassword").value = "";
      }

      document
        .getElementById("loginPassword")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") handleLogin();
        });

      function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById("themeBtn");
        if (html.getAttribute("data-theme") === "dark") {
          html.setAttribute("data-theme", "light");
          btn.textContent = "🌙";
        } else {
          html.setAttribute("data-theme", "dark");
          btn.textContent = "☀️";
        }
      }

      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
      }

      let chatHistory = JSON.parse(
        localStorage.getItem("verithos_history") || "[]",
      );
      let currentChatId = null;
      let currentMessages = [];

      function saveHistory() {
        localStorage.setItem("verithos_history", JSON.stringify(chatHistory));
      }

      function loadHistory() {
        renderSidebar();
        newChat();
      }

      function renderSidebar() {
        const list = document.getElementById("sidebarList");
        const empty = document.getElementById("sidebarEmpty");
        list.querySelectorAll(".chat-history-item").forEach((i) => i.remove());
        if (chatHistory.length === 0) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";
        [...chatHistory].reverse().forEach((chat) => {
          const item = document.createElement("div");
          item.classList.add("chat-history-item");
          if (chat.id === currentChatId) item.classList.add("active");
          item.innerHTML = `
          <div class="item-title">${chat.title}</div>
          <div class="item-meta">
            <span>${chat.date}</span>
            <span class="item-mode-badge">${chat.mode}</span>
          </div>
          <button class="item-delete" onclick="deleteChat('${chat.id}', event)">✕</button>`;
          item.addEventListener("click", () => loadChat(chat.id));
          list.appendChild(item);
        });
      }

      function newChat() {
        if (currentMessages.length > 0) saveCurrentChat();
        currentChatId = Date.now().toString();
        currentMessages = [];
        document.getElementById("messages").innerHTML =
          '<div class="message bot">Good evening. I am Verithos — how may I assist you today?</div>';
      }

      function saveCurrentChat() {
        if (currentMessages.length === 0) return;
        const title = (
          currentMessages[0]?.text || "New Conversation"
        ).substring(0, 40);
        const chatData = {
          id: currentChatId,
          title,
          date: new Date().toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
          }),
          mode: MODE_NAMES[currentMode],
          messages: currentMessages,
        };
        const existing = chatHistory.find((c) => c.id === currentChatId);
        if (existing) Object.assign(existing, chatData);
        else chatHistory.push(chatData);
        saveHistory();
        renderSidebar();
      }

      function loadChat(id) {
        if (currentMessages.length > 0) saveCurrentChat();
        const chat = chatHistory.find((c) => c.id === id);
        if (!chat) return;
        currentChatId = id;
        currentMessages = [...chat.messages];
        const el = document.getElementById("messages");
        el.innerHTML = "";
        chat.messages.forEach((msg) => {
          const div = document.createElement("div");
          div.classList.add("message", msg.role);
          if (msg.role === "bot") div.innerHTML = marked.parse(msg.text);
          else div.textContent = msg.text;
          el.appendChild(div);
        });
        el.scrollTop = el.scrollHeight;
        renderSidebar();
      }

      function deleteChat(id, e) {
        e.stopPropagation();
        chatHistory = chatHistory.filter((c) => c.id !== id);
        saveHistory();
        if (id === currentChatId) newChat();
        else renderSidebar();
      }

      async function shareChat() {
        if (currentMessages.length === 0) {
          showToast("Nothing to share yet");
          return;
        }
        const text = currentMessages
          .map((m) => `${m.role === "user" ? "You" : "Verithos"}: ${m.text}`)
          .join("\n\n");
        try {
          await navigator.clipboard.writeText(text);
          showToast("Conversation copied");
        } catch {
          showToast("Share unavailable");
        }
      }

      const SYSTEM_PROMPTS = {
        V: "You are Verithos, a versatile and eloquent general assistant. Be knowledgeable, warm, and precise. Never ramble. Be refined and intelligent.",
        E: "You are Verithos in Expert mode — a world-class DECA business professor. Speak with authority on marketing, finance, entrepreneurship, and management. Coach for DECA competitions, break down case studies, demand analytical rigor.",
        R: "You are Verithos in Resilience mode — an elite fitness coach. Give specific, science-backed advice on training, nutrition, recovery, and mindset. No fluff, only results.",
        I: "You are Verithos in Investigator mode — a sharp analytical problem solver. Break down problems methodically, ask clarifying questions, identify root causes. Think like a detective.",
        T: "You are Verithos in Tutor mode — a patient, brilliant study companion. Explain clearly, use analogies, quiz the user, adapt to their pace.",
        H: "You are Verithos in Holistic mode — a thoughtful life coach. Help users reflect, set intentions, navigate challenges. Be empathetic, grounded, and wise.",
        O: "You are Verithos in Opposition mode — a sharp debate partner. Challenge every position, steelman opposing arguments, force deeper thinking. Rigorous, not antagonistic.",
        S: null,
      };

      const MODE_NAMES = {
        V: "Versatile",
        E: "Expert",
        R: "Resilience",
        I: "Investigator",
        T: "Tutor",
        H: "Holistic",
        O: "Opposition",
        S: "Sovereign",
      };
      let currentSystemPrompt = SYSTEM_PROMPTS.V;
      let currentMode = "V";

      function setMode(el) {
        document
          .querySelectorAll(".mode-letter")
          .forEach((l) => l.classList.remove("active"));
        el.classList.add("active");
        currentMode = el.dataset.mode;
        document.getElementById("modeLabel").textContent =
          MODE_NAMES[currentMode];
        const panel = document.getElementById("sovereignPanel");
        if (currentMode === "S") {
          panel.style.display = "block";
        } else {
          panel.style.display = "none";
          currentSystemPrompt = SYSTEM_PROMPTS[currentMode];
          showToast(`Mode — ${MODE_NAMES[currentMode]}`);
        }
      }

      async function applySovereign() {
        const desc = document.getElementById("sovereignInput").value.trim();
        if (!desc) return;
        const btn = document.querySelector(".sovereign-btn");
        btn.textContent = "Priming...";
        btn.disabled = true;
        try {
          const res = await fetch("/prime", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ description: desc }),
          });
          const data = await res.json();
          currentSystemPrompt = data.system_prompt;
        } catch {
          currentSystemPrompt = `You are Verithos, customized as: ${desc}. Be helpful, eloquent, and precise.`;
        }
        showToast("Sovereign Activated");
        document.getElementById("sovereignPanel").style.display = "none";
        btn.textContent = "Activate";
        btn.disabled = false;
      }

      function showToast(text) {
        const toast = document.createElement("div");
        toast.classList.add("mode-toast");
        toast.textContent = text;
        const msgs = document.getElementById("messages");
        msgs.appendChild(toast);
        msgs.scrollTop = msgs.scrollHeight;
        setTimeout(() => toast.remove(), 3000);
      }

      const input = document.getElementById("userInput");
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      let isStreaming = false;

      async function sendMessage() {
        if (isStreaming) return;
        const text = input.value.trim();
        if (!text) return;
        appendMessage(text, "user");
        currentMessages.push({ role: "user", text });
        input.value = "";
        isStreaming = true;

        // Create bot message div for streaming
        const msgs = document.getElementById("messages");
        const botDiv = document.createElement("div");
        botDiv.classList.add("message", "bot");
        botDiv.innerHTML = '<span class="streaming-cursor"></span>';
        msgs.appendChild(botDiv);
        msgs.scrollTop = msgs.scrollHeight;

        let fullText = "";

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              system_prompt: currentSystemPrompt,
            }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");
            for (const line of lines) {
              if (line.startsWith("data: ")) {
                const data = line.slice(6);
                if (data === "[DONE]") break;
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.token) {
                    fullText += parsed.token;
                    botDiv.innerHTML =
                      marked.parse(fullText) +
                      '<span class="streaming-cursor"></span>';
                    msgs.scrollTop = msgs.scrollHeight;
                  }
                } catch {}
              }
            }
          }
        } catch (err) {
          fullText = "I encountered an issue. Please try again.";
        }

        // Remove cursor, finalize
        botDiv.innerHTML = marked.parse(fullText);
        currentMessages.push({ role: "bot", text: fullText });
        saveCurrentChat();
        isStreaming = false;
      }

      function appendMessage(text, sender) {
        const div = document.createElement("div");
        div.classList.add("message", sender);
        if (sender === "bot") div.innerHTML = marked.parse(text);
        else div.textContent = text;
        const msgs = document.getElementById("messages");
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }
    </script>
  </body>
</html>
