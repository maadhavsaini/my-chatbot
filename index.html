<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verithos</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root[data-theme="dark"] {
        --bg: #0a0a08;
        --bg-secondary: #111110;
        --surface: #161614;
        --border: #2a2820;
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --cream: #f5efe0;
        --text: #e8dcc8;
        --text-muted: #7a7060;
        --user-bubble: #1e1a10;
        --bot-bubble: #13120f;
        --shadow: rgba(0, 0, 0, 0.6);
        --glow: rgba(201, 168, 76, 0.15);
      }

      :root[data-theme="light"] {
        --bg: #faf6ee;
        --bg-secondary: #f5efe0;
        --surface: #ffffff;
        --border: #e8dcc8;
        --gold: #9a7230;
        --gold-light: #c49a3c;
        --cream: #2a2010;
        --text: #2a2010;
        --text-muted: #9a8a6a;
        --user-bubble: #2a2010;
        --bot-bubble: #f5efe0;
        --shadow: rgba(100, 80, 40, 0.15);
        --glow: rgba(154, 114, 48, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Raleway", sans-serif;
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        transition: background 0.5s ease;
        background-image:
          radial-gradient(ellipse at 20% 50%, var(--glow) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, var(--glow) 0%, transparent 50%);
      }

      .chat-container {
        width: 100%;
        max-width: 520px;
        height: 92vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow:
          0 32px 80px var(--shadow),
          0 0 0 1px var(--border);
        animation: riseUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }

      @keyframes riseUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .chat-header {
        padding: 28px 32px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        position: relative;
      }

      .chat-header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 32px;
        right: 32px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }

      .header-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.8rem;
        font-weight: 300;
        letter-spacing: 0.12em;
        color: var(--gold);
        text-transform: uppercase;
        line-height: 1;
      }

      .brand-tagline {
        font-size: 0.62rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 400;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 8px var(--gold);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .toggle-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .toggle-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .chat-messages {
        flex: 1;
        padding: 28px 32px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .chat-messages::-webkit-scrollbar {
        width: 4px;
      }
      .chat-messages::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .message {
        max-width: 80%;
        padding: 14px 18px;
        font-size: 0.88rem;
        line-height: 1.7;
        opacity: 0;
        animation: messageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        background: var(--user-bubble);
        color: var(--gold-light);
        align-self: flex-end;
        border: 1px solid var(--border);
        border-bottom-right-radius: 2px;
        border-radius: 12px 12px 2px 12px;
        font-family: "Raleway", sans-serif;
        font-weight: 300;
      }

      .message.bot {
        background: var(--bot-bubble);
        color: var(--text);
        align-self: flex-start;
        border: 1px solid var(--border);
        border-radius: 2px 12px 12px 12px;
        font-family: "Cormorant Garamond", serif;
        font-size: 1rem;
        font-weight: 300;
        position: relative;
      }

      .message.bot::before {
        content: "◆";
        position: absolute;
        top: 14px;
        left: -20px;
        font-size: 0.4rem;
        color: var(--gold);
        opacity: 0.6;
      }

      .message.bot p {
        margin-bottom: 8px;
      }
      .message.bot p:last-child {
        margin-bottom: 0;
      }
      .message.bot strong {
        color: var(--gold-light);
        font-weight: 600;
      }
      .message.bot em {
        font-style: italic;
        color: var(--text-muted);
      }
      .message.bot ul,
      .message.bot ol {
        padding-left: 18px;
        margin-bottom: 8px;
      }
      .message.bot li {
        margin-bottom: 4px;
      }
      .message.bot code {
        background: var(--bg);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.8rem;
        color: var(--gold);
        border: 1px solid var(--border);
      }

      .typing {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 14px 18px;
        background: var(--bot-bubble);
        border: 1px solid var(--border);
        border-radius: 2px 12px 12px 12px;
        align-self: flex-start;
        animation: messageIn 0.4s ease forwards;
        opacity: 0;
      }

      .typing span {
        width: 5px;
        height: 5px;
        background: var(--gold);
        border-radius: 50%;
        animation: typingBounce 1.4s infinite;
        opacity: 0.6;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typingBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border));
      }

      .divider::after {
        background: linear-gradient(90deg, var(--border), transparent);
      }

      .chat-input {
        padding: 20px 32px 28px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        position: relative;
      }

      .chat-input::before {
        content: "";
        position: absolute;
        top: 0;
        left: 32px;
        right: 32px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px 16px;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease;
        background: var(--bg-secondary);
      }

      .input-wrapper:focus-within {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px var(--glow);
      }

      .chat-input input {
        flex: 1;
        background: none;
        border: none;
        color: var(--text);
        font-family: "Raleway", sans-serif;
        font-size: 0.88rem;
        font-weight: 300;
        outline: none;
        letter-spacing: 0.02em;
      }

      .chat-input input::placeholder {
        color: var(--text-muted);
        font-style: italic;
        font-family: "Cormorant Garamond", serif;
      }

      .send-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-muted);
        width: 32px;
        height: 32px;
        border-radius: 2px;
        cursor: pointer;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        flex-shrink: 0;
      }

      .send-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--glow);
      }

      .footer-text {
        text-align: center;
        margin-top: 10px;
        font-size: 0.58rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="header-left">
          <div class="brand-name">Verithos</div>
          <div class="brand-tagline">Intelligent Discourse</div>
        </div>
        <div class="header-right">
          <div class="status-dot"></div>
          <button
            class="toggle-btn"
            onclick="toggleTheme()"
            title="Toggle theme"
          >
            ☀️
          </button>
        </div>
      </div>

      <div class="chat-messages" id="messages">
        <div class="divider">Begin</div>
        <div class="message bot">
          Good evening. I am Verithos — how may I assist you today?
        </div>
      </div>

      <div class="chat-input">
        <div class="input-wrapper">
          <input type="text" id="userInput" placeholder="Speak your mind..." />
          <button class="send-btn" onclick="sendMessage()">→</button>
        </div>
        <div class="footer-text">Verithos · Powered by AI</div>
      </div>
    </div>

    <script>
      const input = document.getElementById("userInput");
      const messages = document.getElementById("messages");

      function toggleTheme() {
        const html = document.documentElement;
        const btn = document.querySelector(".toggle-btn");
        if (html.getAttribute("data-theme") === "dark") {
          html.setAttribute("data-theme", "light");
          btn.textContent = "🌙";
        } else {
          html.setAttribute("data-theme", "dark");
          btn.textContent = "☀️";
        }
      }

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendMessage();
      });

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        input.value = "";

        const typing = document.createElement("div");
        typing.classList.add("typing");
        typing.innerHTML = "<span></span><span></span><span></span>";
        messages.appendChild(typing);
        messages.scrollTop = messages.scrollHeight;

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const data = await res.json();
        messages.removeChild(typing);
        appendMessage(data.reply, "bot");
      }

      function appendMessage(text, sender) {
        const div = document.createElement("div");
        div.classList.add("message", sender);
        if (sender === "bot") {
          div.innerHTML = marked.parse(text);
        } else {
          div.textContent = text;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }
    </script>
  </body>
</html>
